apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moodle-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    targetRevision: 28.0.0
    chart: moodle
    helm:
      parameters:
        - name: moodleUsername
          value: admin
        - name: moodlePassword
          value: Admin12345*
        - name: mariadb.auth.rootPassword
          value: root12345*
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: moodle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
